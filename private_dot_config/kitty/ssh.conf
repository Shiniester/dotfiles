# --- 全局默认设置 (应用于所有未单独定义的 host) ---
# 自动拷贝 kitty 的终端信息定义，确保远程服务器能正确识别 kitty 终端 [cite: 76]
copy --dest .terminfo/x/xterm-kitty ~/.terminfo/x/xterm-kitty

# 开启远程 kitty 功能，这是在远程使用 'kitten transfer' 和 'icat' 的前提 [cite: 132]
remote_kitty if-needed

# 自动共享 SSH 连接以减少后续登录的延迟 [cite: 139, 140]
share_connections yes

# 设置远程环境变量，例如默认编辑器 [cite: 122]
# env EDITOR=nvim

# --- 特定主机配置示例 ---
# hostname production-server
#     # 自动将本地的 shell 配置文件同步到远程服务器 [cite: 114, 188]
#     copy .zshrc .vimrc
#
#     # 递归拷贝整个配置目录，但排除大文件或敏感文件夹 [cite: 114, 117, 170]
#     copy --dest configs/scripts scripts/
#     copy --exclude .git --exclude node_modules my-project/
#
#     # 连接到该主机时自动更改终端背景色，以防误操作 [cite: 129]
#     color_scheme Solarized Dark
#
# hostname dev-machine
#     # 指定远程工作目录 [cite: 127]
#     cwd ~/projects/main
#     # 使用 Python 作为启动脚本解释器（适用于某些 sh 较弱的系统） [cite: 110, 100]
#     interpreter python3
