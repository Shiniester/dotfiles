[mgr]
ratio = [1, 2, 2]
sort_by = "alphabetical"
linemode = "mtime"

[preview]
max_width = 900
max_height = 1200
image_quality   = 50 # 50~90
image_delay     = 0 # 延迟发送

[opener]
edit = [
  { run = '${EDITOR:-vi} "$@"', desc = "$EDITOR", block = true, for = "unix" },
  { run = 'code %*', orphan = true, desc = "code", for = "windows" },
  { run = 'code -w %*', block = true, desc = "code (block)", for = "windows" },
]
open = [
  # { run = 'doxx "$@"', desc = "doxx", block = true, for = "unix" },
  # { run = 'tw "$@"', desc = "tabiew", block = true, for = "unix" },
  { run = 'xdg-open "$1"', desc = "Open", for = "linux" },
  { run = 'open "$@"', desc = "Open", for = "macos" },
  { run = 'start "" "%1"', orphan = true, desc = "Open", for = "windows" },
  { run = 'termux-open "$1"', desc = "Open", for = "android" },
]
extract = [
  { run = 'unzip -O gb18030 "$@"', desc = "Extract with encoding", for = "unix" },
  { run = 'ya pub extract --list "$@"', desc = "Extract here", for = "unix" },
  { run = 'ya pub extract --list %*', desc = "Extract here", for = "windows" },
]
image = [
  { run = 'imv -n "$1" "$(dirname "$1")"', orphan = true, desc = "imv", for = "unix" },
]
doc = [
  { run = 'doxx "$@"', desc = "doxx", block = true, for = "unix" },
]
sheet = [
  { run = 'tw "$@"', desc = "tabiew", block = true, for = "unix" },
]

# image open
[[open.prepend_rules]]
mime = "image/*"
use = ["image", "open", "reveal"]

# doc open
[[open.prepend_rules]]
url = "*.{docx,doc}"
use = ["doc","open","reveal"]

# sheet open
[[open.prepend_rules]]
url = "*.{csv,tsv,xlsx,xls,xlsx,xlsm,xlsb,db,sqlite}"
use = ["sheet","open","reveal"]

# git
[[plugin.prepend_fetchers]]
id = "git"
name = "*"
run = "git"

[[plugin.prepend_fetchers]]
id = "git"
name = "*/"
run = "git"

# --- piper ---
# eza
[[plugin.prepend_previewers]]
name = "*/"
run = 'piper -- eza -TL=3 --color=always --icons=always --group-directories-first --no-quotes "$1"'

# csv
[[plugin.prepend_previewers]]
url = "*.csv"
run = 'piper -- bat -p --color=always "$1"'

# markdown
[[plugin.prepend_previewers]]
name = "*.md"
run = 'piper -- CLICOLOR_FORCE=1 glow -w=$w -s=dark "$1"'

# zip
[[plugin.prepend_previewers]]
mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}"
run = 'piper -- ouch list --tree "$1"'

# eza-preview
[[plugin.prepend_previewers]]
url = "*/"
run = "eza-preview"

## doc
[[plugin.prepend_previewers]]
url = "*.docx"
run = "docx"

# --- mediainfo prepend_preloaders ---

# Replace magick, image, video with mediainfo
[[plugin.prepend_preloaders]]
mime = "{audio,video,image}/*"
run = "mediainfo"

[[plugin.prepend_preloaders]]
mime = "application/subrip"
run = "mediainfo"

# Adobe Photoshop is image/adobe.photoshop, already handled above
# Adobe Illustrator
[[plugin.prepend_preloaders]]
mime = "application/postscript"
run = "mediainfo"

[[plugin.prepend_preloaders]]
mime = "application/illustrator"
run = "mediainfo"

[[plugin.prepend_preloaders]]
mime = "application/dvb.ait"
run = "mediainfo"

[[plugin.prepend_preloaders]]
mime = "application/vnd.adobe.illustrator"
run = "mediainfo"

[[plugin.prepend_preloaders]]
mime = "image/x-eps"
run = "mediainfo"

[[plugin.prepend_preloaders]]
mime = "application/eps"
run = "mediainfo"

# Sometimes AI file is recognized as "application/pdf". Lmao.
# In this case use file extension instead:
[[plugin.prepend_preloaders]]
url = "*.{ai,eps,ait}"
run = "mediainfo"

# Hide metadata by default.
# Example for image mimetype:
[[plugin.prepend_preloaders]]
mime = "{image}/*"
run = "mediainfo --no-metadata"

# Hide image preview by default.
# Example for video mimetype:
[[plugin.prepend_preloaders]]
mime = "{video}/*"
run = "mediainfo --no-preview"

# NOTE: Use both --no-metadata and --no-preview will display nothing. :)
# Make sure both of your previewers and preloaders has the same arguments (--no-metadata and --no-preview)

# --- mediainfo prepend_previewers ---

# Replace magick, image, video with mediainfo
[[plugin.prepend_previewers]]
mime = "{audio,video,image}/*"
run = "mediainfo"

[[plugin.prepend_previewers]]
mime = "application/subrip"
run = "mediainfo"

# Adobe Photoshop is image/adobe.photoshop, already handled above
# Adobe Illustrator
[[plugin.prepend_previewers]]
mime = "application/postscript"
run = "mediainfo"

[[plugin.prepend_previewers]]
mime = "application/illustrator"
run = "mediainfo"

[[plugin.prepend_previewers]]
mime = "application/dvb.ait"
run = "mediainfo"

[[plugin.prepend_previewers]]
mime = "application/vnd.adobe.illustrator"
run = "mediainfo"

[[plugin.prepend_previewers]]
mime = "image/x-eps"
run = "mediainfo"

[[plugin.prepend_previewers]]
mime = "application/eps"
run = "mediainfo"

# Sometimes AI file is recognized as "application/pdf". Lmao.
# In this case use file extension instead:
[[plugin.prepend_previewers]]
url = "*.{ai,eps,ait}"
run = "mediainfo"

# Hide metadata by default.
# Example for image mimetype:
[[plugin.prepend_previewers]]
mime = "{image}/*"
run = "mediainfo --no-metadata"

# Hide image preview by default.
# Example for video mimetype:
[[plugin.prepend_previewers]]
mime = "{video}/*"
run = "mediainfo --no-preview"

# NOTE: Use both --no-metadata and --no-preview will display nothing. :)
# Make sure both of your previewers and preloaders has the same arguments (--no-metadata and --no-preview)

# There are more extensions, mime types which are supported by mediainfo.
# Just add file's MIME type to `previewers`, `preloaders` above.
# https://mediaarea.net/en/MediaInfo/Support/Formats
# If it's not working, file an issue at https://github.com/boydaihungst/mediainfo.yazi/issues

# For a large file like Adobe Illustrator, Adobe Photoshop, etc
# you may need to increase the memory limit if no image is rendered.
# https://yazi-rs.github.io/docs/configuration/yazi#tasks

[tasks]
image_alloc = 1073741824 # = 1024*1024*1024 = 1024MB
